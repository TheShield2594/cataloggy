services:
  db:
    image: postgres:16
    # Local development defaults; values can be overridden via .env
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cataloggy}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      # Exposed for local development only. Remove for production deployments.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cataloggy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-cataloggy}
      PORT: 7000
    ports:
      - "7000:7000"
    depends_on:
      db:
        condition: service_healthy

  addon:
    build:
      context: .
      dockerfile: apps/addon/Dockerfile
    environment:
      PORT: 7001
    ports:
      - "7001:7001"

volumes:
  pgdata:
