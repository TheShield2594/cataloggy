services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cataloggy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cataloggy"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cataloggy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cataloggy
      PORT: "7000"
      API_TOKEN: dev-token
      CATALOGGY_ALLOWED_ORIGINS: http://localhost:7002
      CATALOGGY_API_PUBLIC: http://localhost:7000
      TRAKT_CLIENT_ID: ""
      TRAKT_CLIENT_SECRET: ""
      TRAKT_REDIRECT_URI: ""
      TRAKT_POLL_INTERVAL_SEC: "300"
      TMDB_API_KEY: ""
    ports:
      - "7000:7000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cataloggy

  addon:
    build:
      context: .
      dockerfile: apps/addon/Dockerfile
    environment:
      PORT: "7001"
      CATALOGGY_API_BASE: http://api:7000
      CATALOGGY_API_TOKEN: dev-token
      ADDON_PUBLIC_BASE: http://localhost:7001
    ports:
      - "7001:7001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cataloggy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE: http://localhost:7000
    ports:
      - "7002:7002"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7002/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cataloggy

volumes:
  pgdata:

networks:
  cataloggy:
    driver: bridge
