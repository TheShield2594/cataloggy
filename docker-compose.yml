services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cataloggy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cataloggy"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cataloggy
      PORT: 7000
    ports:
      - "7000:7000"
    depends_on:
      db:
        condition: service_healthy

  addon:
    build:
      context: .
      dockerfile: apps/addon/Dockerfile
    environment:
      PORT: 7001
    ports:
      - "7001:7001"

volumes:
  pgdata:
