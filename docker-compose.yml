services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cataloggy}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cataloggy"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cataloggy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-cataloggy}
      PORT: "7000"
      API_TOKEN: ${API_TOKEN:-dev-token}
      CATALOGGY_ALLOWED_ORIGINS: ${CATALOGGY_ALLOWED_ORIGINS:-http://192.168.1.20:7002}
      CATALOGGY_API_PUBLIC: ${CATALOGGY_API_PUBLIC:-http://192.168.1.20:7000}
      # Optional integrations — set these in a .env file or export them.
      # Leaving them unset is safe; the API validates at startup/request time
      # and returns clear error messages if they are missing when needed.
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID}
      TRAKT_CLIENT_SECRET: ${TRAKT_CLIENT_SECRET}
      TRAKT_REDIRECT_URI: ${TRAKT_REDIRECT_URI:-http://192.168.1.20:7000/trakt/oauth/callback}
      TRAKT_POLL_INTERVAL_SEC: ${TRAKT_POLL_INTERVAL_SEC:-300}
      TMDB_API_KEY: ${TMDB_API_KEY}
      AI_REFRESH_INTERVAL_SEC: ${AI_REFRESH_INTERVAL_SEC:-86400}
    ports:
      - "7000:7000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cataloggy

  addon:
    build:
      context: .
      dockerfile: apps/addon/Dockerfile
    environment:
      PORT: "7001"
      CATALOGGY_API_BASE: http://api:7000
      CATALOGGY_API_TOKEN: ${API_TOKEN:-dev-token}
      ADDON_PUBLIC_BASE: ${ADDON_PUBLIC_BASE:-http://192.168.1.20:7001}
    ports:
      - "7001:7001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cataloggy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://192.168.1.20:7000}
    ports:
      - "7002:7002"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7002/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cataloggy

volumes:
  pgdata:

networks:
  cataloggy:
    driver: bridge
